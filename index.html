<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Yaamaa Social & Tasks</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#10b981" />
    
    <!-- iOS / Safari App support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Yaamaa" />
    <link rel="apple-touch-icon" href="/logo.jpg" />
    <link rel="icon" type="image/jpg" href="/logo.jpg" />
    
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then(reg => console.log("PWA Service Worker registered:", reg.scope))
            .catch(err => console.error("PWA Service Worker registration failed:", err));
        });
      }

      // Capture PWA installation event
      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
        window.dispatchEvent(new CustomEvent("pwa-install-available"));
        console.log("PWA installation prompt is available!");
      });

      // Track when app is installed successfully
      window.addEventListener("appinstalled", () => {
        window.deferredPrompt = null;
        console.log("PWA was installed successfully!");
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
