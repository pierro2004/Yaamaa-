<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Yaamaa Chat - Messagerie Sécurisée</title>
    <link rel="manifest" href="/manifest-chat.json" />
    <meta name="theme-color" content="#059669" />
    
    <!-- iOS / Safari App support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Yaamaa Chat" />
    <link rel="apple-touch-icon" href="/logo.jpg" />
    <link rel="icon" type="image/jpg" href="/logo.jpg" />

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }

      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        window.deferredChatPrompt = e;
        window.dispatchEvent(new CustomEvent("chat-install-available"));
      });
    </script>
  </head>
  <body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="chat-root"></div>
    <script type="module" src="/src/chat-main.tsx"></script>
  </body>
</html>
